{% extends "base.html" %}

{% block title %}Home - Finance Dashboard{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/styles/ag-grid.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/styles/ag-theme-quartz.css">

<script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

<script>
    window.transactions = {{ transactions | tojson }};
</script>
<div class="header">
    <h3 id="greeting">
        </h4>
        <div class="utility">
            <button onclick=openNotifs() id="notif-btn"><svg xmlns="http://www.w3.org/2000/svg" height="24px"
                    viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                    <path
                        d="M160-200v-80h80v-280q0-83 50-147.5T420-792v-28q0-25 17.5-42.5T480-880q25 0 42.5 17.5T540-820v28q80 20 130 84.5T720-560v280h80v80H160Zm320-300Zm0 420q-33 0-56.5-23.5T400-160h160q0 33-23.5 56.5T480-80ZM320-280h320v-280q0-66-47-113t-113-47q-66 0-113 47t-47 113v280Z" />
                </svg>
            </button>
            <button onclick=openNotifs() id="notif-btn"><svg xmlns="http://www.w3.org/2000/svg" height="24px"
                    viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                    <path
                        d="M480-28 346-160H160v-186L28-480l132-134v-186h186l134-132 134 132h186v186l132 134-132 134v186H614L480-28Zm0-252q83 0 141.5-58.5T680-480q0-83-58.5-141.5T480-680v400Zm0 140 100-100h140v-140l100-100-100-100v-140H580L480-820 380-720H240v140L140-480l100 100v140h140l100 100Zm0-340Z" />
                </svg>
            </button>

        </div>
</div>
<div class="latest-transactions">
    <div class="transactions-container">
        <span class="transactions-header">
            <h2>Transactions</h2>
            <span class="controls">
                <button class="interact-btn">Export as...</button>
                <form id="file-upload-form"action="{{ url_for('import_transactions')}}" method="post" enctype="multipart/form-data">
                    <label for="file-upload" id="file-drag">
                        Import CSV
                    </label>
                    <!-- label onclick-->
                    <input id="file-upload" name="csv_file" type="file" accept=".csv" />
                    <button type="submit" id="uploadBtn">Upload</button>
                </form>
            </span>

        </span>
        <div id="transactions">
            <div id="myGrid" class="ag-theme-quartz"></div>
        </div>
    </div>
</div>
<div class="transaction-details">
    <h2>Transaction Details</h2>
    <div class="transaction-boxes">

    </div>
</div>

{% endblock %}
